name: lorebook
description: "D&D 5.5e character sheet & campaign companion"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  supabase_flutter: ^2.10.1
  shared_preferences: ^2.5.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  # Widgetbook：被 lib/widgetbook/ use-case 引用，故置 dependencies；
  # 僅 lib/widgetbook.dart 進入點可達，正式 App（main.dart）不會打包進去。
  widgetbook: ^3.23.0
  widgetbook_annotation: ^3.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.4
  widgetbook_generator: ^3.24.0
  # Riverpod codegen 暫未採用（provider 目前手寫）；如需再加：
  # riverpod_generator / riverpod_annotation / riverpod_lint

flutter:
  uses-material-design: true

  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Variable.ttf
    - family: SourceSans3
      fonts:
        - asset: assets/fonts/SourceSans3-Variable.ttf
        - asset: assets/fonts/SourceSans3-Italic-Variable.ttf
          style: italic
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: NotoSerifTC
      fonts:
        - asset: assets/fonts/NotoSerifTC-Variable.ttf
  assets:
    - shorebird.yaml

flutter_launcher_icons:
  image_path: "designs/images/appIcon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#F9F5EC"
  adaptive_icon_foreground: "designs/images/appIcon_fg.png"
  macos:
    generate: true
    image_path: "designs/images/appIcon.png"
  web:
    generate: true
    image_path: "designs/images/appIcon.png"
    background_color: "#F9F5EC"
    theme_color: "#F9F5EC"
